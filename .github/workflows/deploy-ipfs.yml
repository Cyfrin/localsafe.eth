# Manual-only IPFS pin. The canonical release flow lives in `release/`
# (`pnpm release` from your terminal). This workflow exists only as a break-glass
# option to re-pin from CI via Actions → Run workflow.
name: Build and Deploy to IPFS

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2.4.1
        # version is read from the `packageManager` field in package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_IPFS_BUILD: "true"

      - name: Deploy to Pinata
        id: pinata
        uses: aave/pinata-action@35662944e92cf082457973f10aa42e48df179b47
        with:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
          PIN_ALIAS: 'localsafe-${{ github.ref_name }}'
          BUILD_LOCATION: './out'
          CID_VERSION: 1

      - name: Output IPFS CID
        run: |
          echo "::notice title=IPFS Deployment::Successfully deployed to IPFS!"
          echo "::notice title=IPFS CID::${{ steps.pinata.outputs.hash }}"
          echo "::notice title=IPFS Gateway::${{ steps.pinata.outputs.uri }}"

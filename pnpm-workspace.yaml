# Block ALL dependency build/install scripts (supply-chain hardening). pnpm 10+
# blocks dependency scripts by default; these are the only deps that ship one.
# Each was verified unnecessary here — `pnpm build` and `pnpm lint` both pass
# with every entry set to `false`:
#   - @tailwindcss/oxide, unrs-resolver: native binary ships as a prebuilt
#     platform optionalDependency loaded at runtime; the postinstall is only a
#     fallback downloader.
#   - sharp: unused (output: "export" + images.unoptimized).
#   - bufferutil, utf-8-validate: optional `ws` perf addons with JS fallbacks.
#   - keccak: browser uses its JS build; prebuilds cover linux/win/mac-x64.
# Flip an entry to `true` only if a future dependency genuinely needs to compile.
allowBuilds:
  '@tailwindcss/oxide': false
  bufferutil: false
  keccak: false
  sharp: false
  unrs-resolver: false
  utf-8-validate: false
